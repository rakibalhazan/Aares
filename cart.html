<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart — Aares</title>
  <meta name="description" content="Review your cart and proceed to checkout at Aares.">
  <link rel="icon" href="assets/logo.webp" type="image/webp">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1A1A1A">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>

  <div id="progress-bar"></div>

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__brand">
        <img src="assets/logo.webp" alt="Aares" class="navbar__logo" width="32" height="32">
        <span class="navbar__name">Aares</span>
      </a>
      <div class="navbar__links">
        <a href="index.html"  class="navbar__link">Home</a>
        <a href="search.html" class="navbar__link">Shop</a>
      </div>
      <div class="navbar__actions">
        <a href="search.html"  class="navbar__icon-btn" aria-label="Search"><i data-lucide="search"></i></a>
        <a href="cart.html"    class="navbar__icon-btn" aria-label="Cart"><i data-lucide="shopping-cart"></i><span class="cart-badge hidden"></span></a>
        <a href="account.html" class="navbar__icon-btn" aria-label="Account"><i data-lucide="user"></i></a>
      </div>
    </div>
  </nav>

  <main class="page-wrapper" id="main-content">
    <div class="container">

      <div class="page-title">
        <h1>My Cart</h1>
      </div>

      <!-- Cart Layout -->
      <div class="cart-layout" id="js-cart-layout">

        <!-- Cart Items -->
        <div class="cart-items-col">
          <div id="js-cart-items" aria-live="polite" aria-label="Cart items">
            <!-- Injected by JS -->
          </div>
        </div>

        <!-- Order Summary -->
        <aside class="cart-summary" id="js-cart-summary" aria-label="Order summary">
          <h2 class="cart-summary__title">Order Summary</h2>

          <div class="cart-summary__lines">
            <div class="cart-summary__line">
              <span>Subtotal</span>
              <span id="js-subtotal">—</span>
            </div>
            <div class="cart-summary__line">
              <span>Delivery</span>
              <span class="text-muted">Calculated at checkout</span>
            </div>
          </div>

          <div class="cart-summary__divider"></div>

          <div class="cart-summary__total">
            <span>Total</span>
            <span id="js-total">—</span>
          </div>

          <button class="btn btn--primary btn--block btn--lg" id="js-checkout-btn">
            <i data-lucide="arrow-right"></i>
            <span class="btn__text">Proceed to Checkout</span>
          </button>

          <a href="search.html" class="cart-summary__continue">
            <i data-lucide="arrow-left"></i>
            Continue Shopping
          </a>
        </aside>

      </div>

      <!-- Empty Cart State (hidden by default) -->
      <div class="empty-state" id="js-empty-cart" hidden>
        <div class="empty-state__icon">
          <i data-lucide="shopping-cart"></i>
        </div>
        <h2 class="empty-state__title">Your cart is empty</h2>
        <p class="empty-state__desc">Looks like you haven't added anything yet.</p>
        <a href="search.html" class="btn btn--primary" style="margin-top:var(--sp-4)">
          <i data-lucide="shopping-bag"></i>
          <span class="btn__text">Start Shopping</span>
        </a>
      </div>

    </div>
  </main>

  <nav class="bottom-nav" aria-label="Mobile navigation">
    <a href="index.html"   class="bottom-nav__item"><i data-lucide="house"></i><span class="bottom-nav__label">Home</span></a>
    <a href="search.html"  class="bottom-nav__item"><i data-lucide="search"></i><span class="bottom-nav__label">Search</span></a>
    <a href="cart.html"    class="bottom-nav__item"><i data-lucide="shopping-cart"></i><span class="bottom-nav__badge hidden"></span><span class="bottom-nav__label">Cart</span></a>
    <a href="account.html" class="bottom-nav__item"><i data-lucide="user"></i><span class="bottom-nav__label">Account</span></a>
  </nav>

  <button id="back-to-top" aria-label="Back to top"><i data-lucide="arrow-up"></i></button>
  <div id="offline-banner" role="alert"><i data-lucide="wifi-off"></i> No internet connection</div>
  <div id="toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cart-page.js"></script>
</body>
</html>
