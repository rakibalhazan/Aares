<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — Aares</title>
  <meta name="description" content="Your order has been placed successfully at Aares.">
  <link rel="icon" href="assets/logo.webp" type="image/webp">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1A1A1A">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/order-confirmation.css">
</head>
<body>

  <div id="progress-bar"></div>

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__brand">
        <img src="assets/logo.webp" alt="Aares" class="navbar__logo" width="32" height="32">
        <span class="navbar__name">Aares</span>
      </a>
      <div class="navbar__actions">
        <a href="account.html" class="navbar__icon-btn" aria-label="Account"><i data-lucide="user"></i></a>
      </div>
    </div>
  </nav>

  <main class="page-wrapper" id="main-content">
    <div class="confirmation-container">

      <!-- Success Icon -->
      <div class="confirmation-icon anim-scale-in">
        <i data-lucide="check-circle"></i>
      </div>

      <h1 class="confirmation-title reveal">Order Placed!</h1>
      <p class="confirmation-subtitle reveal delay-1">
        Thank you for your order. We will contact you to confirm delivery.
      </p>

      <!-- Order Details Card -->
      <div class="confirmation-card reveal delay-2">
        <div class="confirmation-card__row">
          <span class="confirmation-card__label">Order ID</span>
          <span class="confirmation-card__value" id="js-conf-order-id">—</span>
        </div>
        <div class="confirmation-card__divider"></div>
        <div class="confirmation-card__row">
          <span class="confirmation-card__label">Total Amount</span>
          <span class="confirmation-card__value confirmation-card__value--accent" id="js-conf-total">—</span>
        </div>
        <div class="confirmation-card__divider"></div>
        <div class="confirmation-card__row">
          <span class="confirmation-card__label">Payment</span>
          <span class="confirmation-card__value" id="js-conf-payment">—</span>
        </div>
      </div>

      <!-- Support -->
      <div class="confirmation-support reveal delay-3">
        <div class="confirmation-support__icon">
          <i data-lucide="phone"></i>
        </div>
        <div class="confirmation-support__text">
          <p class="confirmation-support__title">Need help with your order?</p>
          <a href="tel:+8801XXXXXXXXX" class="confirmation-support__number">
            Call us: +880 1X-XXXX-XXXX
          </a>
        </div>
      </div>

      <!-- Actions -->
      <div class="confirmation-actions reveal delay-4">
        <a href="account.html#orders" class="btn btn--outline">
          <i data-lucide="package"></i>
          <span class="btn__text">View My Orders</span>
        </a>
        <a href="index.html" class="btn btn--primary">
          <i data-lucide="shopping-bag"></i>
          <span class="btn__text">Continue Shopping</span>
        </a>
      </div>

    </div>
  </main>

  <nav class="bottom-nav" aria-label="Mobile navigation">
    <a href="index.html"   class="bottom-nav__item"><i data-lucide="house"></i><span class="bottom-nav__label">Home</span></a>
    <a href="search.html"  class="bottom-nav__item"><i data-lucide="search"></i><span class="bottom-nav__label">Search</span></a>
    <a href="cart.html"    class="bottom-nav__item"><i data-lucide="shopping-cart"></i><span class="bottom-nav__badge hidden"></span><span class="bottom-nav__label">Cart</span></a>
    <a href="account.html" class="bottom-nav__item"><i data-lucide="user"></i><span class="bottom-nav__label">Account</span></a>
  </nav>

  <div id="offline-banner" role="alert"><i data-lucide="wifi-off"></i> No internet connection</div>
  <div id="toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/order-confirmation.js"></script>
</body>
</html>
